<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Alke Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- ⚠️ IMPORTANTE: si este archivo está en /pages, debe ser ../css -->
    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<nav class="navbar navbar-dark">

    <div class="container">

        <span class="navbar-brand">

            <i class="bi bi-wallet-fill"></i>

            Alke Wallet

        </span>

        <button id="cerrarSesion" class="btn btn-light">

            <i class="bi bi-box-arrow-right"></i>

            Salir

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card wallet-card p-4">

        <div class="row align-items-center">

            <div class="col-md-8">

                <small>Usuario</small>

                <div class="user-card mt-2">

                    <i class="bi bi-person-circle"></i>

                    <span id="usuario"></span>

                </div>

            </div>

            <div class="col-md-4 text-md-end mt-4 mt-md-0">

                <small>Saldo disponible</small>

                <h2 class="mt-2">

                    $

                    <span id="saldo"></span>

                </h2>

            </div>

        </div>

    </div>

    <div class="row mt-4 g-3">

        <div class="col-md-4">

            <a href="deposit.html"
               class="btn btn-primary w-100 menu-btn">

                <i class="bi bi-piggy-bank-fill"></i>

                Depositar

            </a>

        </div>

        <div class="col-md-4">

            <a href="sendmoney.html"
               class="btn btn-primary w-100 menu-btn">

                <i class="bi bi-send-fill"></i>

                Transferir

            </a>

        </div>

        <div class="col-md-4">

            <a href="transactions.html"
               class="btn btn-primary w-100 menu-btn">

                <i class="bi bi-clock-history"></i>

                Movimientos

            </a>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="../js/data.js"></script>

<script src="../js/menu.js"></script>

<!-- ✅ SCRIPT AÑADIDO (FUNCIONALIDAD SIN CAMBIAR DISEÑO) -->
<script>
$(document).ready(function () {

    // 🔐 PROTECCIÓN: si no hay login, vuelve al login
    if (!localStorage.getItem("logged")) {
        window.location.href = "../login.html";
        return;
    }

    // 👤 mostrar usuario
    $("#usuario").text(localStorage.getItem("usuario"));

    // 💰 mostrar saldo
    let saldo = localStorage.getItem("saldo") || 0;
    $("#saldo").text(parseInt(saldo).toLocaleString("es-CL"));

    // 🚪 cerrar sesión
    $("#cerrarSesion").click(function () {
        localStorage.clear();
        window.location.href = "../login.html";
    });

});
</script>

</body>

</html>
