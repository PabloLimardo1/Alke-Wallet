<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Enviar dinero</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark">

    <div class="container">

        <span class="navbar-brand fs-4">

            <i class="bi bi-wallet2"></i>

            Alke Wallet

        </span>

        <a href="menu.html" class="btn btn-light">

            <i class="bi bi-arrow-left"></i>

            Volver

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card p-5">

                <div class="text-center">

                    <i class="bi bi-send-fill text-success"
                       style="font-size:60px;"></i>

                    <h2 class="mt-3">

                        Transferir dinero

                    </h2>

                    <p class="text-secondary">

                        Envía dinero de forma rápida y segura.

                    </p>

                </div>

                <hr>

                <div class="text-center mb-4">

                    <small class="text-secondary">

                        Saldo disponible

                    </small>

                    <h1 class="text-success">

                        $

                        <span id="saldo"></span>

                    </h1>

                </div>

                <form id="transferForm">

                    <div class="mb-3">

                        <label class="form-label">

                            Buscar contacto

                        </label>

                        <input
                            type="text"
                            id="buscar"
                            class="form-control"
                            placeholder="Escribe un nombre...">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Contacto

                        </label>

                        <select
                            id="contacto"
                            class="form-select">

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Monto

                        </label>

                        <input
                            type="number"
                            id="monto"
                            class="form-control"
                            placeholder="Ej: 20000"
                            min="1"
                            required>

                    </div>

                    <div class="d-grid gap-2">

                        <button
                            class="btn btn-success">

                            <i class="bi bi-send-fill"></i>

                            Transferir dinero

                        </button>

                        <button
                            type="button"
                            class="btn btn-outline-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#modalContacto">

                            <i class="bi bi-person-plus-fill"></i>

                            Agregar contacto

                        </button>

                    </div>

                </form>

                <div id="mensaje" class="mt-4"></div>

            </div>

        </div>

    </div>

</div>

<!-- Modal -->

<div class="modal fade" id="modalContacto">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Nuevo contacto

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    type="text"
                    id="nuevoContacto"
                    class="form-control"
                    placeholder="Nombre del contacto">

            </div>

            <div class="modal-footer">

                <button
                    id="guardarContacto"
                    class="btn btn-primary">

                    Guardar

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/data.js"></script>

<script src="js/sendmoney.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
